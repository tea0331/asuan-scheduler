name: Daily Digest

on:
  schedule:
    - cron: "5 0 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      OFFICE_API_KEY: ${{ secrets.OFFICE_API_KEY }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            state.db
            lottery-backtest.json
            lottery-predictions.json
            weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        run: python scheduler.py --once

      - name: Commit state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db lottery-backtest.json lottery-predictions.json weight-config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily digest task failed! Check the logs for details."
