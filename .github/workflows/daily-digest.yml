name: Daily Digest

on:
  # 由外部定时服务（cron-job.org）通过 workflow_dispatch API 精准触发
  # 不再用 GitHub schedule——其触发时间不可靠，经常延迟或跳过
  workflow_dispatch:
    inputs:
      force_rerun:
        description: 'Force rerun even if already executed today'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUN_ENV: github-actions
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      OFFICE_API_KEY: ${{ secrets.OFFICE_API_KEY }}
      OFFICE_API_BASE: ${{ secrets.OFFICE_API_BASE }}
      # 🔴 办公室API暂停：服务器地址未就绪，关闭避免报错回退浪费时间
      OFFICE_ENABLED: 'false'
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            state.db
            lottery-backtest.json
            lottery-predictions.json
            weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rerun }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scheduler.py --once $FORCE_FLAG

      - name: Verify email was sent
        run: |
          # 🔴 验证步骤：检查今天是否真的生成了输出文件
          python -c "
          import os, sqlite3, glob
          from datetime import datetime, timezone, timedelta
          CST = timezone(timedelta(hours=8))
          today = datetime.now(CST).strftime('%Y-%m-%d')
          db = sqlite3.connect('state.db')
          rows = db.execute('SELECT success FROM executed_tasks WHERE date=? AND task_name=?', (today, 'daily-digest')).fetchall()
          if rows and rows[0][0]:
              print(f'✅ {today} 日报已完成（内容+邮件）')
          else:
              print(f'⚠️ {today} 日报未完全完成')
              # 检查是否有文件但没发邮件
              files = glob.glob(f'output/{today}*.md')
              if files:
                  print(f'  文件已生成: {files[0]}，但邮件可能未发送')
              else:
                  print(f'  无输出文件')
              exit(1)
          "

      - name: Commit state to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db lottery-backtest.json lottery-predictions.json weight-config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # 🔴 先拉取远程更新再推送，避免冲突
          git pull --rebase || true
          git push || echo "Push failed, but task completed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily digest task failed! Check the logs for details."
