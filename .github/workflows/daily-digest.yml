name: Daily Digest

on:
  schedule:
    # 🔴 主时间：UTC 16:05（北京时间 00:05）
    - cron: "5 16 * * *"
    # 🔴 备用时间：UTC 16:35（北京时间 00:35），防止主时间被GitHub跳过
    - cron: "35 16 * * *"
  workflow_dispatch:
    inputs:
      force_rerun:
        description: 'Force rerun even if already executed today'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUN_ENV: github-actions
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      OFFICE_API_KEY: ${{ secrets.OFFICE_API_KEY }}
      OFFICE_API_BASE: ${{ secrets.OFFICE_API_BASE }}
      OFFICE_ENABLED: ${{ secrets.OFFICE_ENABLED }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            state.db
            lottery-backtest.json
            lottery-predictions.json
            weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rerun }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scheduler.py --once $FORCE_FLAG

      - name: Commit state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db lottery-backtest.json lottery-predictions.json weight-config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # 🔴 先拉取远程更新再推送，避免冲突
          git pull --rebase || true
          git push || echo "Push failed, but task completed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily digest task failed! Check the logs for details."
