name: Daily Digest

on:
  # 🟢 v3.0: 恢复定时cron，每天北京时间07:00自动执行
  schedule:
    - cron: "0 23 * * *"  # UTC 23:00 = CST 07:00
  workflow_dispatch:
    inputs:
      force_rerun:
        description: 'Force rerun even if already executed today'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUN_ENV: github-actions
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      OFFICE_API_KEY: ${{ secrets.OFFICE_API_KEY }}
      OFFICE_API_BASE: ${{ secrets.OFFICE_API_BASE }}
      # 🔴 办公室API暂停：服务器地址未就绪，关闭避免报错回退浪费时间
      OFFICE_ENABLED: 'false'
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout asuan-scheduler
        uses: actions/checkout@v4
        with:
          path: asuan-scheduler

      - name: Checkout liuhai-chan
        uses: actions/checkout@v4
        with:
          repository: tea0331/liuhai-chan
          token: ${{ secrets.PAT_TOKEN }}
          path: liuhai-chan

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            asuan-scheduler/state.db
            asuan-scheduler/algo_state.db
            asuan-scheduler/lottery-backtest.json
            asuan-scheduler/lottery-predictions.json
            asuan-scheduler/weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: asuan-scheduler/requirements.txt

      - name: Install dependencies
        run: pip install -r asuan-scheduler/requirements.txt

      - name: Install liuhai-chan dependencies
        run: pip install aiosqlite passlib[bcrypt] python-jose[cryptography] numpy requests
        # 刘海蟾daily_run依赖，阿算日报即时运行时需要

      - name: Run daily digest
        working-directory: asuan-scheduler
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rerun }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_full_daily.py

      - name: Verify and diagnose
        working-directory: asuan-scheduler
        if: always()
        run: |
          python3 -c "
          import os, glob
          from datetime import datetime, timezone, timedelta
          CST = timezone(timedelta(hours=8))
          today = datetime.now(CST).strftime('%Y-%m-%d')

          # 检查输出文件
          files = glob.glob(f'output/{today}*.md')
          if files:
              print(f'✅ {today} 日报文件已生成: {files[0]}')
              print(f'   文件大小: {os.path.getsize(files[0])}字节')
          else:
              print(f'⚠️ {today} 日报文件未生成（可能generate_full_daily.py运行异常）')
              # 列出output目录内容辅助诊断
              all_files = glob.glob('output/*.md')
              if all_files:
                  print(f'   目录中已有文件: {[os.path.basename(f) for f in sorted(all_files)[-3:]]}')

          # 检查SMTP配置
          if os.getenv('SMTP_PASSWORD'):
              print('✅ SMTP密码环境变量已配置')
          elif os.getenv('SMTP_PASS'):
              print('✅ SMTP_PASS环境变量已配置')
          else:
              print('⚠️ SMTP密码未配置，邮件可能未发送')

          print(f'📋 {today} 日报流程结束')
          "

      - name: Commit state to repo
        if: always()
        working-directory: asuan-scheduler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db algo_state.db lottery-backtest.json lottery-predictions.json weight-config.json output/*.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || echo "Push failed, but task completed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily digest task failed! Check the logs for details."
