name: Daily Backup & Cleanup

on:
  schedule:
    # 北京时间 06:00（UTC 22:00），日报发完后做备份清理
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            state.db
            algo_state.db
            weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ===== 清理过期数据 =====
      - name: Cleanup expired data
        run: |
          echo "=== 计然自动清理 $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          python3 -c "
          import json, sqlite3, glob, os
          from datetime import datetime, timezone, timedelta
          CST = timezone(timedelta(hours=8))
          today = datetime.now(CST).strftime('%Y-%m-%d')

          # 1. state.db保留最近7天
          try:
              conn = sqlite3.connect('state.db')
              c = conn.cursor()
              cutoff7 = (datetime.now(CST) - timedelta(days=7)).strftime('%Y-%m-%d')
              c.execute('DELETE FROM executed_tasks WHERE date < ?', (cutoff7,))
              d1 = c.rowcount
              c.execute(\"DELETE FROM sent_log WHERE sent_at < ?\", (cutoff7 + '%',))
              d2 = c.rowcount
              c.execute(\"DELETE FROM heartbeat WHERE last_tick < ?\", (cutoff7 + '%',))
              c.execute(\"DELETE FROM startup_log WHERE started_at < ?\", (cutoff7 + '%',))
              conn.commit()
              conn.close()
              print(f'  state.db: 删除{d1}条执行记录, {d2}条发送记录')
          except Exception as e:
              print(f'  state.db清理跳过: {e}')

          # 2. algo_state.db保留最近30天
          try:
              conn = sqlite3.connect('algo_state.db')
              c = conn.cursor()
              cutoff30 = (datetime.now(CST) - timedelta(days=30)).strftime('%Y-%m-%d')
              cutoff7 = (datetime.now(CST) - timedelta(days=7)).strftime('%Y-%m-%d')
              # 清理旧的下注记录
              c.execute('DELETE FROM algo_bets WHERE date < ? AND status != ?', (cutoff30, 'pending'))
              d1 = c.rowcount
              c.execute('DELETE FROM algo_settlements WHERE settled_at < ?', (cutoff30 + '%',))
              d2 = c.rowcount
              c.execute('DELETE FROM algo_roi_daily WHERE date < ?', (cutoff30,))
              d3 = c.rowcount
              c.execute('DELETE FROM algo_params WHERE date < ?', (cutoff30,))
              d4 = c.rowcount
              c.execute('DELETE FROM algo_anneal_history WHERE date < ?', (cutoff30,))
              d5 = c.rowcount
              # 保留最近7天的策略状态
              c.execute('DELETE FROM algo_strategy_state WHERE date < ?', (cutoff7,))
              d6 = c.rowcount
              # v3.0新表: 保留7天
              try:
                  c.execute('DELETE FROM algo_orchestrator_context WHERE date < ?', (cutoff7,))
              except: pass
              try:
                  c.execute('DELETE FROM algo_stacking_weights WHERE fitted_at < ?', (cutoff7 + '%',))
              except: pass
              conn.commit()
              conn.close()
              print(f'  algo_state.db: 删除{d1}注+{d2}结算+{d3}ROI+{d4}参数+{d5}退火+{d6}策略')
          except Exception as e:
              print(f'  algo_state.db清理跳过: {e}')

          # 3. output目录保留最近14天
          try:
              cutoff14 = (datetime.now(CST) - timedelta(days=14)).strftime('%Y-%m-%d')
              for f in glob.glob('output/*.md'):
                  basename = os.path.basename(f).replace('.md', '')
                  if basename < cutoff14:
                      os.remove(f)
                      print(f'  删除过期日报: {f}')
          except Exception as e:
              print(f'  output清理跳过: {e}')

          print('清理完成!')
          "

      # ===== 备份（不提交到Git，只缓存） =====
      - name: Save state to cache
        uses: actions/cache/save@v4
        with:
          path: |
            state.db
            algo_state.db
            weight-config.json
          key: asuan-state-backup-${{ github.run_id }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "=== 备份清理完成 ==="
          echo "时间: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "v3.0引擎: algo_state.db已纳入备份清理"
