name: Send Lottery Email

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-lottery:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send lottery email
        run: python send-lottery-email.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery-backtest.json lottery-predictions.json weight-config.json lottery-alerts.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: lottery state update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || echo "Push failed"
