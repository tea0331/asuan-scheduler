name: 🎰 Lottery Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lottery-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: |
            state.db
            lottery-backtest.json
            lottery-predictions.json
            weight-config.json
          key: asuan-state-${{ github.run_id }}
          restore-keys: |
            asuan-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lottery analyzer (full output)
        run: python3 lottery_analyzer.py 2>&1 | tee lottery-output.txt

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: lottery-output
          path: lottery-output.txt
