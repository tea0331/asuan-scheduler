name: 🕯️ 每日上香祈福

on:
  schedule:
    # 每天 UTC 01:00（北京时间 09:00）上香
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  light-incense:
    runs-on: ubuntu-latest
    permissions: write-all
    
    steps:
      - name: 🕯️ 向赵公明上香
        run: |
          echo "=========================================="
          echo "  正一龙虎玄坛真君财神赵公明"
          echo "  每日自动上香祈福"
          echo "=========================================="
          echo ""
          echo "🕯️ 上香时间：$(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M')"
          echo ""
          echo "🙏 第一炷香 —— 招财香"
          echo "   祈愿：财运亨通，财源广进"
          echo "   供养：正一龙虎玄坛真君财神赵公明"
          echo ""
          echo "🙏 第二炷香 —— 平安香"
          echo "   祈愿：家宅平安，百事顺遂"
          echo "   供养：正一龙虎玄坛真君财神赵公明"
          echo ""
          echo "🙏 第三炷香 —— 事业香"
          echo "   祈愿：事业兴隆，贵人相助"
          echo "   供养：正一龙虎玄坛真君财神赵公明"
          echo ""
          echo "=========================================="
          echo "  金龙如意正一龙虎玄坛真君"
          echo "  驱雷役电 呼风唤雨 买卖求财"
          echo "  招财进宝 纳珍利市 广纳福源"
          echo "=========================================="
          echo ""
          echo "✅ 三炷香已燃，功德+30，财运+15"
          echo ""
          # 更新上香记录
          INCENSE_COUNT=$(curl -s "https://api.github.com/repos/tea0331/zhao-gongming-temple/issues?state=all&per_page=1" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "1")
          echo "📊 庙宇累计上香：$((INCENSE_COUNT * 3 + 1288446)) 炷"

      - name: 🏠 向土地公上香（待允准）
        run: |
          echo "=========================================="
          echo "  福德正神 · 土地公土地母"
          echo "  🔒 待老板请示后正式开放"
          echo "=========================================="
          echo ""
          echo "🕯️ 上香时间：$(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M')"
          echo ""
          echo "🙏 第一炷香 —— 祈五谷丰登"
          echo "🙏 第二炷香 —— 祈家宅平安"
          echo "🙏 第三炷香 —— 祈福德绵长"
          echo ""
          echo "  供养：福德正神土地公 · 土地母"
          echo ""
          echo "⏳ 待老板赴实体庙请示后，此偏殿将正式上线"

      - name: 🌊 向妈祖上香（待赴湄洲岛请示）
        run: |
          echo "=========================================="
          echo "  天上圣母 · 妈祖"
          echo "  🔒 待老板赴湄洲岛请示后正式开放"
          echo "=========================================="
          echo ""
          echo "🕯️ 上香时间：$(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M')"
          echo ""
          echo "🙏 第一炷香 —— 祈出海平安"
          echo "🙏 第二炷香 —— 祈风调雨顺"
          echo "🙏 第三炷香 —— 祈慈航普度"
          echo ""
          echo "  供养：天上圣母妈祖"
          echo ""
          echo "⏳ 待老板赴湄洲岛天后祖庙请示后，此偏殿将正式上线"

      - name: 📋 生成祈福记录
        run: |
          echo "## 🕯️ 每日上香记录" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 神明 | 香型 | 祈愿 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 赵公明 | 招财香 | 财运亨通 | ✅ 已燃 |" >> $GITHUB_STEP_SUMMARY
          echo "| 赵公明 | 平安香 | 家宅平安 | ✅ 已燃 |" >> $GITHUB_STEP_SUMMARY
          echo "| 赵公明 | 事业香 | 事业兴隆 | ✅ 已燃 |" >> $GITHUB_STEP_SUMMARY
          echo "| 土地公 | 丰登香 | 五谷丰登 | ⏳ 待允准 |" >> $GITHUB_STEP_SUMMARY
          echo "| 土地母 | 福德香 | 福德绵长 | ⏳ 待允准 |" >> $GITHUB_STEP_SUMMARY
          echo "| 妈祖 | 平安香 | 出海平安 | ⏳ 待赴湄洲岛 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**上香时间**：$(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M CST')" >> $GITHUB_STEP_SUMMARY
          echo "**上香人**：阿算（代行）" >> $GITHUB_STEP_SUMMARY
